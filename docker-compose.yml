services:
  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - patient-service
      - clinic-service
      - appointment-service
      - doctor-service
      - telemedicine-service
      - payment-service
      - notification-service
    networks:
      - medstream-net

  auth_db:
    image: postgres:15-alpine
    container_name: medstream_auth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_auth
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - medstream-net

  admin_db:
    image: postgres:15-alpine
    container_name: medstream_admin_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_admin
    ports:
      - "5433:5432"
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-admin-db.sql:/docker-entrypoint-initdb.d/init-admin-db.sql:ro
    networks:
      - medstream-net

  patientcare_db:
    image: postgres:15-alpine
    container_name: medstream_patientcare_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_patientcare
    ports:
      - "5434:5432"
    volumes:
      - patientcare_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-patientcare-db.sql:/docker-entrypoint-initdb.d/init-patientcare-db.sql:ro
    networks:
      - medstream-net

  finance_db:
    image: postgres:15-alpine
    container_name: medstream_finance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_finance
    ports:
      - "5435:5432"
    volumes:
      - finance_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-finance-db.sql:/docker-entrypoint-initdb.d/init-finance-db.sql:ro
    networks:
      - medstream-net

  communication_db:
    image: postgres:15-alpine
    container_name: medstream_communication_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_communication
    ports:
      - "5436:5432"
    volumes:
      - communication_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-communication-db.sql:/docker-entrypoint-initdb.d/init-communication-db.sql:ro
    networks:
      - medstream-net

  auth-service:
    build: ./auth-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./auth-service:/app
    depends_on:
      auth_db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@auth_db:5432/medstream_auth
      PATIENT_SERVICE_URL: http://patient-service:8000
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-in-dev}
    ports:
      - "8001:8000"
    networks:
      - medstream-net

  patient-service:
    build: ./patient-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./patient-service:/app
    depends_on:
      patientcare_db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@patientcare_db:5432/medstream_patientcare
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-medstream/patient-documents}
      MAX_DOCUMENT_SIZE_BYTES: ${MAX_DOCUMENT_SIZE_BYTES:-10485760}
    ports:
      - "8002:8000"
    networks:
      - medstream-net

  clinic-service:
    build: ./clinic-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./clinic-service:/app
    depends_on:
      admin_db:
        condition: service_started
      appointment-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@admin_db:5432/medstream_admin
      AUTH_SERVICE_URL: http://auth-service:8000
      APPOINTMENT_SERVICE_URL: http://appointment-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      LOGIN_URL: http://localhost:5173/login
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change-me-in-dev}
    ports:
      - "8003:8000"
    networks:
      - medstream-net

  appointment-service:
    build: ./appointment-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./appointment-service:/app
    depends_on:
      patientcare_db:
        condition: service_started
      doctor-service:
        condition: service_started
      ai-service:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@patientcare_db:5432/medstream_patientcare
      DOCTOR_SERVICE_URL: http://doctor-service:8000
      CLINIC_SERVICE_URL: http://clinic-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      PAYMENT_SERVICE_URL: http://payment-service:8000
      AI_SERVICE_URL: http://ai-service:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-medstream-internal-token}
    ports:
      - "8004:8000"
    networks:
      - medstream-net

  ai-service:
    build: ./ai-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./ai-service:/app
    depends_on:
      doctor-service:
        condition: service_started
    environment:
      DOCTOR_SERVICE_URL: http://doctor-service:8000
      APPOINTMENT_SERVICE_URL: http://appointment-service:8000
      PATIENT_SERVICE_URL: http://patient-service:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-medstream-internal-token}
      CHATBOT_ENABLE_LLM: ${CHATBOT_ENABLE_LLM:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}
      OVERVIEW_RECENT_LIMIT: ${OVERVIEW_RECENT_LIMIT:-10}
      OVERVIEW_HTTP_TIMEOUT_SECONDS: ${OVERVIEW_HTTP_TIMEOUT_SECONDS:-20}
      REPORT_FETCH_TIMEOUT_SECONDS: ${REPORT_FETCH_TIMEOUT_SECONDS:-5}
      REPORT_TEXT_MAX_CHARS: ${REPORT_TEXT_MAX_CHARS:-2400}
    ports:
      - "8009:8000"
    networks:
      - medstream-net

  telemedicine-service:
    build: ./telemedicine-service
    depends_on:
      patientcare_db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@patientcare_db:5432/medstream_patientcare
      APPOINTMENT_SERVICE_URL: http://appointment-service:8000
      DOCTOR_SERVICE_URL: http://doctor-service:8000
      TELEMEDICINE_PROVIDER: ${TELEMEDICINE_PROVIDER:-google}
      MEETING_LINK_BASE_URL: ${MEETING_LINK_BASE_URL:-https://meet.medstream.local/s}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8080/telemedicine/auth/google/callback}
      GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-https://www.googleapis.com/auth/meetings.space.created}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./telemedicine-service:/app
    ports:
      - "8008:8000"
    networks:
      - medstream-net

  payment-service:
    build: ./payment-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./payment-service:/app
    depends_on:
      finance_db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://dev_user:dev_password@finance_db:5432/medstream_finance
      JWT_SECRET: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      APPOINTMENT_SERVICE_URL: http://appointment-service:8000
    ports:
      - "8005:8000"
    networks:
      - medstream-net

  notification-service:
    build: ./notification-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./notification-service:/app
    env_file:
      - ./notification-service/app/.env
    depends_on:
      communication_db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://dev_user:dev_password@communication_db:5432/medstream_communication
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
    ports:
      - "8006:8000"
    networks:
      - medstream-net

  doctor-service:
    build: ./doctor-service
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./doctor-service:/app
    depends_on:
      admin_db:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@admin_db:5432/medstream_admin
      APPOINTMENT_SERVICE_URL: http://appointment-service:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-medstream-internal-token}
    ports:
      - "8007:8000"
    networks:
      - medstream-net

networks:
  medstream-net:
    driver: bridge

volumes:
  auth_postgres_data:
  admin_postgres_data:
  patientcare_postgres_data:
  finance_postgres_data:
  communication_postgres_data:
