services:
  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - patient-service
      - clinic-service
      - appointment-service
      - payment-service
      - notification-service
    networks:
      - medstream-net

  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"
    networks:
      - medstream-net

  patient-service:
    build: ./patient-service
    ports:
      - "8002:8000"
    networks:
      - medstream-net

  clinic-service:
    build: ./clinic-service
    ports:
      - "8003:8000"
    networks:
      - medstream-net

  appointment-service:
    build: ./appointment-service
    ports:
      - "8004:8000"
    networks:
      - medstream-net

  payment-service:
    build: ./payment-service
    ports:
      - "8005:8000"
    networks:
      - medstream-net

  notification-service:
    build: ./notification-service
    ports:
      - "8006:8000"
    networks:
      - medstream-net

networks:
  medstream-net:
    driver: bridge
