services:
  api-gateway:
    image: nginx:1.27-alpine
    container_name: api-gateway
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - patient-service
      - clinic-service
      - appointment-service
      - doctor-service
      - telemedicine-service
      - payment-service
      - notification-service
    networks:
      - medstream-net

  auth_db:
    image: postgres:15-alpine
    container_name: medstream_auth_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_auth
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medstream_auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medstream-net

  admin_db:
    image: postgres:15-alpine
    container_name: medstream_admin_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_admin
    ports:
      - "5433:5432"
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-admin-db.sql:/docker-entrypoint-initdb.d/init-admin-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medstream_admin"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medstream-net

  patientcare_db:
    image: postgres:15-alpine
    container_name: medstream_patientcare_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_patientcare
    ports:
      - "5434:5432"
    volumes:
      - patientcare_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-patientcare-db.sql:/docker-entrypoint-initdb.d/init-patientcare-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medstream_patientcare"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medstream-net

  finance_db:
    image: postgres:15-alpine
    container_name: medstream_finance_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_finance
    ports:
      - "5435:5432"
    volumes:
      - finance_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-finance-db.sql:/docker-entrypoint-initdb.d/init-finance-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medstream_finance"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medstream-net

  communication_db:
    image: postgres:15-alpine
    container_name: medstream_communication_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medstream_communication
    ports:
      - "5436:5432"
    volumes:
      - communication_postgres_data:/var/lib/postgresql/data
      - ./infrastructure/db/init-communication-db.sql:/docker-entrypoint-initdb.d/init-communication-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medstream_communication"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - medstream-net

  auth-service:
    build: ./auth-service
    depends_on:
      auth_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@auth_db:5432/medstream_auth
    ports:
      - "8001:8000"
    networks:
      - medstream-net

  patient-service:
    build: ./patient-service
    depends_on:
      patientcare_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@patientcare_db:5432/medstream_patientcare
    ports:
      - "8002:8000"
    networks:
      - medstream-net

  clinic-service:
    build: ./clinic-service
    depends_on:
      admin_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@admin_db:5432/medstream_admin
    ports:
      - "8003:8000"
    networks:
      - medstream-net

  appointment-service:
    build: ./appointment-service
    depends_on:
      patientcare_db:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@patientcare_db:5432/medstream_patientcare
      DOCTOR_SERVICE_URL: http://doctor-service:8000
    ports:
      - "8004:8000"
    networks:
      - medstream-net

  telemedicine-service:
    build: ./telemedicine-service
    depends_on:
      patientcare_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@patientcare_db:5432/medstream_patientcare
    ports:
      - "8008:8000"
    networks:
      - medstream-net

  payment-service:
    build: ./payment-service
    depends_on:
      finance_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@finance_db:5432/medstream_finance
    ports:
      - "8005:8000"
    networks:
      - medstream-net

  notification-service:
    build: ./notification-service
    depends_on:
      communication_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@communication_db:5432/medstream_communication
    ports:
      - "8006:8000"
    networks:
      - medstream-net

  doctor-service:
    build: ./doctor-service
    depends_on:
      admin_db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://dev_user:dev_password@admin_db:5432/medstream_admin
      APPOINTMENT_SERVICE_URL: http://appointment-service:8000
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8007:8000"
    networks:
      - medstream-net

networks:
  medstream-net:
    driver: bridge

volumes:
  auth_postgres_data:
  admin_postgres_data:
  patientcare_postgres_data:
  finance_postgres_data:
  communication_postgres_data:
