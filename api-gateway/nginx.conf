events {}

http {
  server {
    listen 80;

    location = / {
      add_header Content-Type application/json;
      return 200 '{"status":"ok","message":"MedStream API Gateway"}';
    }

    location /auth/ {
      proxy_pass http://auth-service:8000/;
    }

    location /patients/ {
      proxy_pass http://patient-service:8000/;
    }

    location /clinics/ {
      proxy_pass http://clinic-service:8000/;
    }

    location /appointments/ {
      proxy_pass http://appointment-service:8000/;
    }

    location /doctors/ {
      proxy_pass http://doctor-service:8000/;
    }

    location /telemedicine/ {
      proxy_pass http://telemedicine-service:8000/;
    }

    location /payments/ {
      proxy_pass http://payment-service:8000/;
    }

    location /notifications/ {
      proxy_pass http://notification-service:8010/;
    }
  }
}
