apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medstream-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: medstream.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8000
          - path: /patients
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 8000
          - path: /clinics
            pathType: Prefix
            backend:
              service:
                name: clinic-service
                port:
                  number: 8000
          - path: /appointments
            pathType: Prefix
            backend:
              service:
                name: appointment-service
                port:
                  number: 8000
          - path: /doctors
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 8000
          - path: /telemedicine
            pathType: Prefix
            backend:
              service:
                name: telemedicine-service
                port:
                  number: 8000
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 8000
          - path: /notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8000
